services:
  oovah_app:
    build: .
    container_name: ${COMPOSE_PROJECT_NAME}
    ports:
      - "8012:8012"
    environment:
      - SQLITE_DB_PATH=/app/oovah.db
      - STATIC_PATH=web/dist
    networks:
      - app-network
    volumes:
      - .:/app
      - ./.env:/root/.env:ro

networks:
  app-network:
    driver: bridge
